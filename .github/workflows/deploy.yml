# ============================================================
# GitHub Actions — Deploy Astro site to GitHub Pages
#
# Triggers on every push to `main`. Builds with the official
# Astro action, then deploys to Pages.
#
# Before this works, enable GitHub Pages in repo settings:
#   Settings → Pages → Source → "GitHub Actions"
#
# Security notes:
#   - Third-party actions are pinned to a full commit SHA (not a
#     mutable tag) so a repointed/compromised tag can't inject code
#     into CI. The trailing comment records the human-readable version;
#     bump both together when upgrading.
#   - Permissions are denied by default at the top level and granted
#     per job (least privilege): the build job only reads the repo;
#     only the deploy job can write to Pages / mint the OIDC token.
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow running this workflow manually from the Actions tab.
  workflow_dispatch:

# Deny all token scopes by default; jobs opt into exactly what they need.
permissions: {}

# Only allow one deployment at a time (skip queued runs).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Don't leave the GITHUB_TOKEN in .git/config for later steps —
          # the build runs dependency install scripts and doesn't need git auth.
          persist-credentials: false

      - name: Install, build, and upload
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6.1.1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to Pages
      id-token: write # mint the OIDC token Pages deployment verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
